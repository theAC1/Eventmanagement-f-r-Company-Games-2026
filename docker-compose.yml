
services:
  app:
    build: .
    container_name: cg26-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://cg26:${DB_PASSWORD}@db:5432/companygames
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://0.0.0.0:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - cg26

  db:
    image: postgres:16-alpine
    container_name: cg26-db
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=companygames
      - POSTGRES_USER=cg26
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cg26 -d companygames"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - cg26

  nginx:
    image: nginx:alpine
    container_name: cg26-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    restart: always
    networks:
      - cg26

volumes:
  pgdata:

networks:
  cg26:
    driver: bridge
