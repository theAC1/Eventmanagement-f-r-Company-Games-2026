name: Deploy to Homelab

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        working-directory: /home/deploy/company-games-2026
        run: git pull origin main

      - name: Build containers
        working-directory: /home/deploy/company-games-2026
        run: docker compose build --no-cache

      - name: Restart containers
        working-directory: /home/deploy/company-games-2026
        run: docker compose up -d

      - name: Run database migrations
        working-directory: /home/deploy/company-games-2026
        run: docker compose exec -T app npx prisma migrate deploy || echo "⚠️ No migrations to apply (expected for fresh setup)"

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf http://localhost:80 > /dev/null && echo "✅ Deployment OK: $(date)" || echo "❌ Health check failed"
