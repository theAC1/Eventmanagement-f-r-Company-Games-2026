events {
    worker_connections 1024;
}

http {
    upstream app {
        server app:3000;
    }

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Redirect HTTP → HTTPS (aktivieren wenn SSL eingerichtet)
    # server {
    #     listen 80;
    #     server_name companygames.example.ch;
    #     return 301 https://$server_name$request_uri;
    # }

    server {
        listen 80;
        # listen 443 ssl;  # Aktivieren wenn SSL eingerichtet
        server_name games.arvuna.ch;  # Anpassen: companygames.example.ch

        # SSL (aktivieren wenn Zertifikate vorhanden)
        # ssl_certificate /etc/letsencrypt/live/companygames.example.ch/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/companygames.example.ch/privkey.pem;

        # Gzip
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;

        # Normale Requests → Next.js
        location / {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            limit_req zone=api burst=50 nodelay;
        }

        # WebSocket (Socket.io) → Upgrade-fähig
        location /socket.io/ {
            proxy_pass http://app;
            proxy_http_version 1.1;

            # WebSocket Upgrade Headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket Timeouts (länger als normal)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Next.js Static Files (caching)
        location /_next/static/ {
            proxy_pass http://app;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
